<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archivd</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      min-height: 200px;
      background: #0f1623;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e2d47;
    }
    .logo {
      width: 28px; height: 28px;
      background: #14b8a6;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 14px; height: 14px; color: #fff; }
    .header-title { font-weight: 700; font-size: 15px; color: #f1f5f9; }
    .settings-btn {
      margin-left: auto;
      background: none; border: none;
      color: #64748b; cursor: pointer;
      padding: 4px; border-radius: 6px;
      display: flex; align-items: center;
      transition: color 0.15s;
    }
    .settings-btn:hover { color: #94a3b8; }

    .body { padding: 14px 16px; }

    /* Not on a fic page */
    .empty-state {
      text-align: center;
      padding: 24px 0;
    }
    .empty-state p { color: #64748b; font-size: 12px; line-height: 1.6; }

    /* Not logged in */
    .login-state { text-align: center; padding: 20px 0; }
    .login-state p { color: #94a3b8; margin-bottom: 12px; font-size: 12px; }
    .login-state a {
      display: inline-block;
      padding: 8px 18px;
      background: #14b8a6;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
    }

    /* Fic preview */
    .fic-preview {
      background: #1a2640;
      border: 1px solid #1e2d47;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .fic-title {
      font-weight: 600; font-size: 13px;
      color: #f1f5f9;
      line-height: 1.4;
      margin-bottom: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .fic-meta { color: #64748b; font-size: 11px; margin-bottom: 6px; }
    .fic-badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 6px; border-radius: 4px;
    }
    .badge-G { background: rgba(34,197,94,.15); color: #4ade80; }
    .badge-T { background: rgba(59,130,246,.15); color: #60a5fa; }
    .badge-M { background: rgba(249,115,22,.15); color: #fb923c; }
    .badge-E { background: rgba(239,68,68,.15); color: #f87171; }
    .badge-complete { background: rgba(34,197,94,.1); color: #4ade80; }
    .badge-wip { background: rgba(234,179,8,.1); color: #facc15; }
    .badge-words { background: rgba(100,116,139,.15); color: #94a3b8; }

    /* Shelf selector */
    .label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: #64748b;
      margin-bottom: 5px;
    }
    .shelf-selector {
      width: 100%;
      background: #1a2640;
      border: 1px solid #1e2d47;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      margin-bottom: 10px;
      outline: none;
    }
    .shelf-selector:focus { border-color: #14b8a6; }

    .note-input {
      width: 100%;
      background: #1a2640;
      border: 1px solid #1e2d47;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
      resize: none;
      font-family: inherit;
    }
    .note-input::placeholder { color: #475569; }
    .note-input:focus { border-color: #14b8a6; }

    .save-btn {
      width: 100%;
      padding: 10px;
      background: #14b8a6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .save-btn:hover { opacity: 0.9; }
    .save-btn:disabled { opacity: 0.5; cursor: default; }

    /* Success */
    .success-state { text-align: center; padding: 20px 0; }
    .success-icon {
      width: 44px; height: 44px;
      background: rgba(20,184,166,.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px;
    }
    .success-icon svg { color: #14b8a6; }
    .success-state h3 { font-size: 15px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
    .success-state p { color: #64748b; font-size: 12px; }

    .error-msg {
      color: #f87171; font-size: 12px;
      background: rgba(239,68,68,.1);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 10px;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
    </div>
    <span class="header-title">Archivd</span>
    <button class="settings-btn" id="settings-btn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="body" id="body">
    <div class="empty-state">
      <p>Loading…</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
