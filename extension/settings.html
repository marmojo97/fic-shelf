<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Archivd – Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      max-width: 520px;
      margin: 40px auto;
      padding: 0 20px;
      background: #0f1623;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    p.sub { color: #64748b; font-size: 13px; margin-bottom: 28px; }

    .field { margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #64748b; margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      background: #1a2640;
      border: 1px solid #1e2d47;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #14b8a6; }
    .hint { color: #475569; font-size: 11px; margin-top: 5px; line-height: 1.5; }
    .hint a { color: #14b8a6; }

    .save-btn {
      padding: 10px 24px;
      background: #14b8a6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .save-btn:hover { opacity: 0.9; }

    #status {
      margin-top: 12px;
      color: #4ade80;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Archivd Settings</h1>
  <p class="sub">Configure your connection to your Archivd server.</p>

  <div class="field">
    <label>Archivd API URL</label>
    <input type="url" id="api-url" placeholder="http://localhost:3001" />
    <p class="hint">The URL your Archivd server runs on. Default is http://localhost:3001</p>
  </div>

  <div class="field">
    <label>Auth Token</label>
    <input type="password" id="token" placeholder="Paste your JWT token here…" />
    <p class="hint">
      Sign in to <a href="http://localhost:5173" target="_blank">Archivd</a>, then open the browser console
      and run: <code style="color:#14b8a6;">localStorage.getItem('archivd_token')</code>. Copy that value here.
    </p>
  </div>

  <button class="save-btn" id="save-btn">Save Settings</button>
  <div id="status"></div>

  <script src="settings.js"></script>
</body>
</html>
